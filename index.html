<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中原大學周遭循環杯地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .control-panel {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        label {
            font-weight: bold;
            color: #34495e;
        }
        select {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            width: 100%;
        }
        #map {
            height: 400px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
        }
        .results {
            background: #f8f9fa;
            border-left: 4px solid #2ecc71;
            padding: 15px;
            border-radius: 0 6px 6px 0;
        }
        .shop-item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .shop-item:last-child {
            border-bottom: none;
        }
        .shop-name {
            font-weight: bold;
            color: #2c3e50;
        }
        .shop-info {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CYCU 中原大學周遭循環杯地圖</h1>
    
    <div class="control-panel">
        <label for="location-select">📍 請選擇您目前的位置：</label>
        <select id="location-select" onchange="updateLocation()">
            <option value="">-- 請選擇位置 --</option>
            <option value="gate">中原大學校門口</option>
            <option value="lixing">力行宿舍</option>
            <option value="zhenzhi">真知教學大樓</option>
            <option value="liangshan">良善宿舍</option>
        </select>
    </div>

    <div id="map"></div>

    <div class="results">
        <h3>顯示最近 5 個租借地點：</h3>
        <div id="shop-list">請先選擇上方位置...</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. 初始化地圖（預設座標在中原大學中心）
    const map = L.map('map').setView([24.9575, 121.2408], 16);
    
    // 載入 OpenStreetMap 地圖圖層
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 2. 定義使用者可選的 4 個起點座標
    const userLocations = {
        gate: { name: "中原大學校門口", coords: [24.9582, 121.2408] },
        lixing: { name: "力行宿舍", coords: [24.9610, 121.2415] },
        zhenzhi: { name: "真知教學大樓", coords: [24.9571, 121.2406] },
        liangshan: { name: "良善宿舍", coords: [24.9565, 121.2425] }
    };

    // 3. 模擬中原大學周邊的循環杯租借店家數據（包含費率與座標）
    // 費率參考：目前台灣主流（如全家、7-11、環海淨塑）多為 0 元押金/租借費，逾期才扣款
    const cupShops = [
        { name: "7-ELEVEN 中原大學門市", coords: [24.9581, 121.2405], fee: "免費租借 (押金 0 元，需 3 日內歸還)" },
        { name: "全家便利商店 中壢中原店", coords: [24.9568, 121.2431], fee: "免費租借 (押金 0 元，需 3 日內歸還)" },
        { name: "路易莎咖啡 中原大學門市", coords: [24.9576, 121.2398], fee: "免費租借 (配合環保局循環杯)" },
        { name: "7-ELEVEN 恩源門市 (真知大樓內)", coords: [24.9572, 121.2404], fee: "免費租借 (押金 0 元)" },
        { name: "全家便利商店 中壢新中原店", coords: [24.9595, 121.2422], fee: "免費租借 (配合循環杯系統)" },
        { name: "大苑子 中原店", coords: [24.9558, 121.2412], fee: "免費租借 (詳細依系統公告為主)" },
        { name: "COCO都可 中原二店", coords: [24.9552, 121.2401], fee: "免費租借 (需下載 APP 綁定)" }
    ];

    let currentMarkers = [];
    let userMarker = null;

    // 4. 計算兩點經緯度距離的函式 (哈維辛公式 Haversine Formula)，單位：公里
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // 地球半徑
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // 5. 當使用者切換下拉選單時觸發
    function updateLocation() {
        const select = document.getElementById('location-select');
        const selectedValue = select.value;
        
        // 清除舊的標記
        if (userMarker) map.removeLayer(userMarker);
        currentMarkers.forEach(marker => map.removeLayer(marker));
        currentMarkers = [];

        if (!selectedValue) {
            document.getElementById('shop-list').innerHTML = "請先選擇上方位置...";
            return;
        }

        const currentUserLoc = userLocations[selectedValue];
        const userCoords = currentUserLoc.coords;

        // 地圖中心移到選擇的位置
        map.setView(userCoords, 17);

        // 標記使用者目前位置 (藍色標記或自訂文字)
        userMarker = L.marker(userCoords).addTo(map).bindPopup(`<b>您目前的位置：${currentUserLoc.name}</b>`).openPopup();

        // 計算所有店家到目前位置的距離並排序
        const shopsWithDistance = cupShops.map(shop => {
            const distance = getDistance(userCoords[0], userCoords[1], shop.coords[0], shop.coords[1]);
            return { ...shop, distance: distance };
        });

        // 依距離由近到遠排序，並取前 5 名
        shopsWithDistance.sort((a, b) => a.distance - b.distance);
        const nearestShops = shopsWithDistance.slice(0, 5);

        // 渲染結果列表與地圖標記
        let listHtml = "";
        nearestShops.forEach((shop, index) => {
            const distanceStr = shop.distance.toFixed(3); // 顯示到小數點後三位 (米)
            
            // 產生 HTML
            listHtml += `
                <div class="shop-item">
                    <span class="shop-name">${index + 1}. ${shop.name}</span>
                    <div class="shop-info">
                        📍 距離：${distanceStr} km <br>
                        💰 租借費率：<span style="color: #e67e22; font-weight: bold;">${shop.fee}</span>
                    </div>
                </div>
            `;

            // 在地圖上加上店家的標記
            const shopMarker = L.marker(shop.coords).addTo(map)
                .bindPopup(`<b>${shop.name}</b><br>距離: ${distanceStr} km<br>費率: ${shop.fee}`);
            currentMarkers.push(shopMarker);
        });

        document.getElementById('shop-list').innerHTML = listHtml;
    }
</script>

</body>
</html>
