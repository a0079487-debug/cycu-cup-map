<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中原大學循環杯地圖 (Canva 極致優化版)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 10px;
            /* 科技感深邃藍黑漸層背景 */
            background: linear-gradient(135deg, #070b19, #10172a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .app-card {
            background: #111827; /* 內層卡片深灰色 */
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            width: 100%;
            height: 100%;
            max-width: 480px; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header {
            background: #0f172a;
            color: #38bdf8; /* 亮天藍色標題 */
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }
        .control-panel {
            padding: 12px;
            background: #111827;
        }
        select {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 2px solid #334155;
            border-radius: 12px;
            background-color: #1e293b;
            color: #ffffff;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
        }
        select:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
        }
        #map {
            flex-grow: 1; 
            width: 100%;
            z-index: 1;
        }
        /* Leaflet 彈出視窗 Dark Mode 樣式優化 */
        .leaflet-popup-content-wrapper {
            background: #1e293b !important;
            color: #ffffff !important;
            border: 1px solid #38bdf8;
            border-radius: 10px;
            font-size: 13px;
        }
        .leaflet-popup-tip {
            background: #1e293b !important;
        }
        .info-panel {
            padding: 14px;
            background: #0f172a; /* 底部店家列表背景 */
            max-height: 180px;
            overflow-y: auto; 
        }
        .shop-item {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
        }
        .shop-item:last-child {
            border-bottom: none;
        }
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .shop-name {
            font-weight: bold;
            color: #ffffff;
        }
        .shop-distance {
            color: #38bdf8; /* 距離全面改用公尺標示 */
            font-weight: 600;
            background: rgba(56, 189, 248, 0.12);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .shop-fee {
            color: #94a3b8;
            font-size: 12px;
        }
        .placeholder-text {
            text-align: center;
            color: #475569;
            font-size: 13.5px;
            margin: 20px 0;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1>🌲 CYCU 中原大學循環杯地圖</h1>
    </div>
    
    <div class="control-panel">
        <select id="location-select" onchange="updateLocation()">
            <option value="">📍 請選擇您目前的位置...</option>
            <option value="gate">中原大學校門口</option>
            <option value="lixing">力行宿舍 (體育館旁)</option>
            <option value="zhenzhi">真知教學大樓</option>
            <option value="liangshan">良善宿舍</option>
        </select>
    </div>

    <div id="map"></div>

    <div class="info-panel" id="shop-list">
        <div class="placeholder-text">請選擇上方位置<br><span style="font-size:11px; color:#334155;">將自動為您鎖定最近的 5 個租借點與公尺距離</span></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 初始化地圖
    const map = L.map('map', { zoomControl: false }).setView([24.9575, 121.2408], 16);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // 換上更高對比的 Dark Mode 科技感夜光圖層
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    // 【位置校正】力行宿舍座標已往南修正至新體育館與體育場旁路段
    const userLocations = {
        gate: { name: "中原大學校門口", coords: [24.9582, 121.2408] },
        lixing: { name: "力行宿舍 (體育館旁)", coords: [24.9592, 121.2422] }, 
        zhenzhi: { name: "真知教學大樓", coords: [24.9571, 121.2406] },
        liangshan: { name: "良善宿舍", coords: [24.9565, 121.2425] }
    };

    // 周邊循環杯店家
    const cupShops = [
        { name: "7-ELEVEN 中原大學門市", coords: [24.9581, 121.2405], fee: "免費租借 (押金 0 元，3 日內歸還)" },
        { name: "全家便利商店 中壢中原店", coords: [24.9568, 121.2431], fee: "免費租借 (押金 0 元，3 日內歸還)" },
        { name: "路易莎咖啡 中原大學門市", coords: [24.9576, 121.2398], fee: "免費租借 (配合桃園環保局)" },
        { name: "7-ELEVEN 恩源門市 (真知內)", coords: [24.9572, 121.2404], fee: "免費租借 (校內便利商店)" },
        { name: "全家便利商店 中壢新中原店", coords: [24.9595, 121.2422], fee: "免費租借 (無額外手續費)" },
        { name: "大苑子 中原店", coords: [24.9558, 121.2412], fee: "免費租借 (需使用 App 綁定)" },
        { name: "COCO都可 中原二店", coords: [24.9552, 121.2401], fee: "免費租借 (配合綠色減塑生活)" }
    ];

    let currentMarkers = [];
    let userMarker = null;

    // 計算距離，並直接轉換成「公尺(m)」
    function getDistanceInMeters(lat1, lon1, lat2, lon2) {
        const R = 6371; // 地球半徑 (km)
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return Math.round(R * c * 1000); // 乘上 1000 換算成公尺，並進行四捨五入
    }

    function updateLocation() {
        const select = document.getElementById('location-select');
        const selectedValue = select.value;
        
        if (userMarker) map.removeLayer(userMarker);
        currentMarkers.forEach(marker => map.removeLayer(marker));
        currentMarkers = [];

        if (!selectedValue) {
            document.getElementById('shop-list').innerHTML = '<div class="placeholder-text">請選擇上方位置<br><span style="font-size:11px; color:#334155;">將自動為您鎖定最近的 5 個租借點與公尺距離</span></div>';
            return;
        }

        const currentUserLoc = userLocations[selectedValue];
        const userCoords = currentUserLoc.coords;

        // 建立起點標記
        userMarker = L.marker(userCoords).addTo(map).bindPopup(`<b>📍 您在這裡：${currentUserLoc.name}</b>`).openPopup();

        // 用陣列收集所有要顯示的標記座標，用來做自動視覺縮放
        const boundsPoints = [userCoords];

        // 計算距離 (公尺) 並排序
        const shopsWithDistance = cupShops.map(shop => {
            const distance = getDistanceInMeters(userCoords[0], userCoords[1], shop.coords[0], shop.coords[1]);
            return { ...shop, distance: distance };
        });

        shopsWithDistance.sort((a, b) => a.distance - b.distance);
        const nearestShops = shopsWithDistance.slice(0, 5); 

        let listHtml = "";
        nearestShops.forEach((shop, index) => {
            listHtml += `
                <div class="shop-item">
                    <div class="shop-header">
                        <span class="shop-name">${index + 1}. ${shop.name}</span>
                        <span class="shop-distance">🏃 ${shop.distance} 公尺</span>
                    </div>
                    <div class="shop-fee">💰 費率：${shop.fee}</div>
                </div>
            `;

            const shopMarker = L.marker(shop.coords).addTo(map)
                .bindPopup(`<b>${shop.name}</b><br>距離: ${shop.distance} 公尺<br>${shop.fee}`);
            currentMarkers.push(shopMarker);
            boundsPoints.push(shop.coords); // 把店家座標也丟進縮放範圍陣列中
        });

        document.getElementById('shop-list').innerHTML = listHtml;

        // 【智慧縮放優化】讓地圖自動縮放到「剛好把起點與 5 個店家通通包進畫面」的完美比例
        map.fitBounds(boundsPoints, { padding: [40, 40] });
    }
</script>

</body>
</html>
